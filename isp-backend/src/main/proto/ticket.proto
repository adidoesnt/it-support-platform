// TODO: Update response fields
message GetTicketsResponse {
  string message = 1;
}

// TODO: Add request fields
message GetTicketByIdRequest {}

// TODO: Update response fields
message GetTicketByIdResponse {
  string message = 1;
}

// TODO: Add request fields
message UpdateTicketByIdRequest {}

// TODO: Update response fields
message UpdateTicketByIdResponse {
  string message = 1;
}

// TODO: Add request fields
message DeleteTicketByIdRequest {}

// TODO: Update response fields
message DeleteTicketByIdResponse {
  string message = 1;
}