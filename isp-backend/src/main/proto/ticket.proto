syntax = "proto3";

package com.adidoesnt.itsupportplatform.ticket;

option java_multiple_files = true;
option java_package = "com.adidoesnt.itsupportplatform.ticket.grpc";

service TicketService {
  rpc CreateTicket(CreateTicketRequest) returns (CreateTicketResponse);
  rpc GetTickets(GetTicketsRequest) returns (GetTicketsResponse);
  rpc GetTicketById(GetTicketByIdRequest) returns (GetTicketByIdResponse);
  rpc UpdateTicketById(UpdateTicketByIdRequest) returns (UpdateTicketByIdResponse);
  rpc DeleteTicketById(DeleteTicketByIdRequest) returns (DeleteTicketByIdResponse);
}

enum TicketStatus {
  OPEN = 0;
  IN_PROGRESS = 1;
  RESOLVED = 2;
  CLOSED = 3;
}

message CreateTicketRequest {
  // Required fields
  string title = 1;

  // Optional fields
  optional string description = 2;
  optional TicketStatus status = 3;
}

message CreateTicketResponse {
  bool success = 1;
  Ticket ticket = 2;
}

message Ticket {
  string id = 1;
  string title = 2;
  string description = 3;
  string created_at = 4;
  string updated_at = 5;
  TicketStatus status = 6;
}

// TODO: Add optional pagination fields
message GetTicketsRequest {}

message GetTicketsResponse {
  repeated Ticket tickets = 1;
}

message GetTicketByIdRequest {
  string id = 1;
}

message GetTicketByIdResponse {
  Ticket ticket = 1;
}

message UpdateTicketByIdRequest {
  string id = 1;

  // Optional fields
  optional string title = 2;
  optional string description = 3;
  optional TicketStatus status = 4;
}

message UpdateTicketByIdResponse {
  bool success = 1;
  Ticket ticket = 2;
}

message DeleteTicketByIdRequest {
  string id = 1;
}

message DeleteTicketByIdResponse {
  bool success = 1;
}